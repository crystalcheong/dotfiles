##### Core behavior #####
set -g default-terminal "tmux-256color"
set -g history-limit 100000
set -s escape-time 10
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g detach-on-destroy off
set -g base-index 1
setw -g pane-base-index 1

##### Prefix + keys #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes in current path
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Vim-like pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like pane resizing
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Fast navigation / management
bind x confirm-before -p 'Kill session #S? (y/n)' kill-session
bind & confirm-before -p 'Kill window #W? (y/n)' kill-window
bind ? display-popup -E "$HOME/.tmux/show-help.sh"
bind s choose-tree -s

##### Copy mode (vi) #####
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

##### Status + hints #####
set -g status-interval 2
set -g status-style 'fg=colour252,bg=colour235'
set -g status-left-length 80
set -g status-right-length 120
set -g @hints_on 1

set -g status-left '#[fg=colour81,bold]#S #[fg=colour245]| #[fg=colour222]#I:#W#[default]'
set -g status-right '#{?@hints_on,#{?#{==:#{client_key_table},prefix},#[fg=colour231,bg=colour31,bold] PREFIX: h/j/k/l move | H/J/K/L resize | | - split | ? help #[default],#[fg=colour245]C-a ? help | C-a t hints #[default]},} #[fg=colour245]%Y-%m-%d %H:%M '

bind t if -F '#{@hints_on}' 'set -g @hints_on 0' 'set -g @hints_on 1'

##### Quality-of-life #####
bind r source-file ~/.tmux.conf \; display-message 'tmux config reloaded'
